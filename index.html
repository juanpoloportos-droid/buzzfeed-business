<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Tech & Space Streams</title>
    
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <style>
        :root {
            --bg-color: #0a0b10;
            --surface-color: #121420;
            --accent-glow: #00e5ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: #000;
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid var(--accent-glow);
            box-shadow: 0 4px 30px rgba(0, 229, 255, 0.15);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
            font-weight: 800;
        }

        header span {
            color: var(--accent-glow);
        }

        .main-layout {
            max-width: 1260px;
            width: 100%;
            padding: 25px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 992px) {
            .main-layout {
                grid-template-columns: 3fr 1fr;
            }
        }

        .video-stream {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .video-card {
            background-color: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e293b;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .player-box {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
        }

        .video-meta {
            padding: 20px;
        }

        .video-meta h2 {
            margin: 0 0 12px 0;
            font-size: 1.4rem;
            line-height: 1.4;
            color: #fff;
        }

        .video-meta p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        /* Optimization for High CPM Banner Ads */
        .top-leaderboard-ad {
            width: 100%;
            max-width: 728px;
            min-height: 90px;
            margin: 20px auto 5px auto;
            background: #0f111a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--accent-glow);
        }

        .sidebar-ad-stack {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar-ad-box {
            width: 100%;
            min-height: 250px;
            max-width: 300px;
            margin: 0 auto;
            background: #0f111a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #334155;
            border-radius: 8px;
        }

        .in-stream-native-ad {
            width: 100%;
            min-height: 120px;
            background: #151926;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px dashed #334155;
        }

        #loading-state {
            text-align: center;
            font-size: 1.2rem;
            padding: 80px 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ Tech & Space <span>HQ Stream</span></h1>
    </header>

    <div class="top-leaderboard-ad">
        <span style="color: var(--accent-glow); font-size: 11px; font-weight: bold;">ADSTERRA / HILLTOPADS LEADERBOARD (728x90)</span>
    </div>

    <div class="main-layout">
        
        <main class="video-stream" id="video-feed-target">
            <div id="loading-state">Syncing live media configurations...</div>
        </main>

        <aside class="sidebar-ad-stack">
            <div class="sidebar-ad-box">
                <span style="color: #475569; font-size: 11px;">AD BOX (300x250)</span>
            </div>
            <div class="sidebar-ad-box">
                <span style="color: #475569; font-size: 11px;">HIGH CTR NATIVE/SOCIAL BAR</span>
            </div>
        </aside>

    </div>

    <script>
        // Working live video RSS feed from NASA (Contains clean, unthrottled direct .mp4 links)
        // Wrapped in an open CORS proxy to allow direct front-end parsing.
        const LIVE_VIDEO_RSS = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://www.nasa.gov/rss/dyn/chandra_videos.rss');

        async function initializeRSSVideoPlatform() {
            const feedContainer = document.getElementById('video-feed-target');
            
            try {
                const fetchConnection = await fetch(LIVE_VIDEO_RSS);
                const rawXmlText = await fetchConnection.text();
                
                const xmlParser = new DOMParser();
                const XMLDocument = xmlParser.parseFromString(rawXmlText, "text/xml");
                const entries = XMLDocument.getElementsByTagName("item");

                if (entries.length === 0) {
                    feedContainer.innerHTML = '<div id="loading-state">Streams temporarily offline. Check back shortly.</div>';
                    return;
                }

                feedContainer.innerHTML = ''; // Wipe loader animation
                let activeVideoCounter = 0;

                for (let i = 0; i < entries.length; i++) {
                    const item = entries[i];
                    
                    // Look for structural enclosure media tracks (.mp4 assets)
                    let explicitVideoUrl = '';
                    const enclosureElement = item.getElementsByTagName("enclosure")[0];
                    
                    if (enclosureElement && enclosureElement.getAttribute("type")?.includes("video")) {
                        explicitVideoUrl = enclosureElement.getAttribute("url");
                    }

                    // Skip any feed items that do not contain valid video configurations
                    if (!explicitVideoUrl) continue;

                    const title = item.getElementsByTagName("title")[0]?.textContent || "Trending Broadcast Event";
                    const description = item.getElementsByTagName("description")[0]?.textContent || "Click the player dashboard to sync the full high-definition feed.";
                    const uid = `fluid-instance-id-${activeVideoCounter}`;

                    // Build Card DOM Structure
                    const cardMarkup = document.createElement('div');
                    cardMarkup.className = 'video-card';
                    cardMarkup.innerHTML = `
                        <div class="player-box">
                            <video id="${uid}">
                                <source src="${explicitVideoUrl}" type="video/mp4" />
                            </video>
                        </div>
                        <div class="video-meta">
                            <h2>${title}</h2>
                            <p>${description}</p>
                        </div>
                    `;

                    feedContainer.appendChild(cardMarkup);

                    // Fluid Player Custom Initialization Tuning
                    fluidPlayer(uid, {
                        layoutControls: {
                            fillToContainer: true,
                            responsive: true,
                            autoPlay: false,
                            playbackRateEnabled: true,
                            
                            // PREMIUM VAST VIDEO CPM OPTIMIZATION:
                            // If your account allows Pre-Roll/Mid-Roll VAST URL Tags, remove comments and inject here:
                            /*
                            vastOptions: {
                                adList: [
                                    {
                                        roll: 'preRoll',
                                        vastTag: 'YOUR_VAST_TAG_LINK_FROM_ADNETWORK'
                                    }
                                ]
                            }
                            */
                        }
                    });

                    activeVideoCounter++;

                    // In-Feed Revenue Scaling: Injects banner code spaces every 2 modules
                    if (activeVideoCounter % 2 === 0) {
                        const midStreamAdSlot = document.createElement('div');
                        midStreamAdSlot.className = 'in-stream-native-ad';
                        midStreamAdSlot.innerHTML = `<span style="color: #475569; font-size: 11px; font-weight: bold;">IN-FEED MONETIZATION UNIT</span>`;
                        feedContainer.appendChild(midStreamAdSlot);
                    }
                }

                if(activeVideoCounter === 0) {
                    feedContainer.innerHTML = '<div id="loading-state">Feed sync verified, but no video files found.</div>';
                }

            } catch (err) {
                console.error("CORS proxy or parsing layer handshake error: ", err);
                feedContainer.innerHTML = '<div id="loading-state">Connection timeout parsing the target stream feed.</div>';
            }
        }

        window.onload = initializeRSSVideoPlatform;
    </script>
</body>
</html>
